<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; background: #f5f0e8; color: #1a1a1a; min-height: 100vh; }

  header { background: #1a1a1a; color: #f5f0e8; padding: 1.5rem 2rem; display: flex; align-items: baseline; gap: 1rem; }
  header h1 { font-size: 1.6rem; font-weight: normal; letter-spacing: 0.04em; }
  header span { font-size: 0.85rem; color: #999; font-family: 'Courier New', monospace; }

  .container { max-width: 850px; margin: 0 auto; padding: 2rem 1.25rem; }

  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 2rem; }
  .metric { background: #fff; border: 1px solid #e0d8cc; border-radius: 6px; padding: 1rem; }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 6px; font-family: 'Courier New', monospace; }
  .metric-value { font-size: 1.6rem; font-weight: normal; }
  .metric-value.spent { color: #b34a00; }

  .card { background: #fff; border: 1px solid #e0d8cc; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 1rem; font-family: 'Courier New', monospace; }

  .form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: #666; font-family: 'Courier New', monospace; }
  
  input[type="number"], input[type="text"], input[type="datetime-local"], select {
    height: 38px; padding: 0 10px;
    border: 1px solid #d0c8bc; border-radius: 5px;
    background: #faf8f4; color: #1a1a1a;
    font-size: 14px; font-family: Georgia, serif;
    outline: none;
  }
  input:focus, select:focus { border-color: #b34a00; background: #fff; }
  .fg-date input { width: 210px; }
  .fg-amount input { width: 100px; }
  .fg-cat select { width: 130px; }
  .fg-note input { flex: 1; min-width: 120px; }

  .btn {
    height: 38px; padding: 0 18px;
    border: 1px solid #1a1a1a; border-radius: 5px;
    background: #1a1a1a; color: #f5f0e8;
    font-size: 13px; font-family: Georgia, serif;
    cursor: pointer; white-space: nowrap;
  }
  .btn:hover { background: #333; }
  .btn.outline { background: transparent; color: #1a1a1a; border-color: #999; }

  .breakdown-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .cat-name { font-size: 13px; min-width: 90px; }
  .bar-wrap { flex: 1; height: 10px; background: #ede8df; border-radius: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
  .cat-pct { font-size: 12px; color: #888; font-family: 'Courier New', monospace; min-width: 38px; text-align: right; }
  .cat-amt { font-size: 12px; color: #555; font-family: 'Courier New', monospace; min-width: 55px; text-align: right; }

  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .log-table th { text-align: left; font-size: 11px; text-transform: uppercase; color: #888; font-family: 'Courier New', monospace; font-weight: normal; padding: 0 8px 8px 0; border-bottom: 1px solid #e0d8cc; }
  .log-table td { padding: 9px 8px 9px 0; border-bottom: 1px solid #f0ebe2; }
  .cat-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-family: 'Courier New', monospace; }
  .del-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; }
  .del-btn:hover { color: #b34a00; }
  .empty-msg { text-align: center; padding: 2rem 0; color: #aaa; font-size: 14px; }

  @media (max-width: 600px) {
    .metrics { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; align-items: stretch; }
    .fg-date input, .fg-amount input, .fg-cat select { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Cash Tracker</h1>
  <span>where did it go?</span>
</header>

<div class="container">
  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Total Spent</div>
      <div class="metric-value spent" id="total">$0.00</div>
    </div>
    <div class="metric">
      <div class="metric-label">Entries</div>
      <div class="metric-value" id="count">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Top Category</div>
      <div class="metric-value" id="top-cat" style="font-size:1rem; padding-top:4px;">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Add Expense</div>
    <div class="form-row">
      <div class="form-group fg-date">
        <label>Date & Time</label>
        <input type="datetime-local" id="datetime">
      </div>
      <div class="form-group fg-amount">
        <label>Amount ($)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group fg-cat">
        <label>Category</label>
        <select id="category">
          <option value="Coffee">☕ Coffee</option>
          <option value="Groceries">🛒 Groceries</option>
          <option value="Tobacco">🚬 Tobacco</option>
          <option value="Drinks">🍺 Drinks</option>
          <option value="Random">🎲 Random</option>
        </select>
      </div>
      <div class="form-group fg-note">
        <label>Note</label>
        <input type="text" id="note" placeholder="Optional">
      </div>
      <button class="btn" onclick="addEntry()">Add</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Spending Breakdown</div>
    <div id="breakdown" class="breakdown"><div class="empty-msg">No entries yet</div></div>
  </div>

  <div class="card">
    <div class="card-title">Log</div>
    <div id="log-wrap"><div class="empty-msg">No entries yet</div></div>
    <div style="margin-top: 1rem; display: flex; gap: 8px; justify-content: flex-end;">
      <button class="btn outline" onclick="clearAll()">Clear All</button>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>
</div>

<script>
const CAT_COLORS = {
  Coffee:    { bg: '#fff3e8', text: '#8a4a00', bar: '#c8813a' },
  Groceries: { bg: '#eaf3ea', text: '#2d6a2d', bar: '#5a8a5a' },
  Tobacco:   { bg: '#f0ece6', text: '#5a4a3a', bar: '#8a7a6a' },
  Drinks:    { bg: '#e8eef6', text: '#2a4a7a', bar: '#4a6a9a' },
  Random:    { bg: '#f3eaf3', text: '#6a2a6a', bar: '#9a5a8a' },
};

let entries = JSON.parse(localStorage.getItem('cashEntries') || '[]');

function setNow() {
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('datetime').value = now.toISOString().slice(0, 16);
}

function save() { localStorage.setItem('cashEntries', JSON.stringify(entries)); }

function addEntry() {
  const amt = parseFloat(document.getElementById('amount').value);
  if (!amt || amt <= 0) { document.getElementById('amount').focus(); return; }
  
  const dtValue = document.getElementById('datetime').value;
  const dateObj = new Date(dtValue);
  const formattedDate = dateObj.toLocaleString('en-GB', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).replace(',', '');

  entries.push({ 
    id: Date.now(), 
    amount: amt, 
    category: document.getElementById('category').value, 
    note: document.getElementById('note').value.trim(), 
    date: formattedDate,
    rawDate: dtValue 
  });

  save();
  document.getElementById('amount').value = '';
  document.getElementById('note').value = '';
  setNow();
  render();
}

function deleteEntry(id) { entries = entries.filter(e => e.id !== id); save(); render(); }
function clearAll() { if (confirm('Clear all?')) { entries = []; save(); render(); } }

function render() {
  const total = entries.reduce((s, e) => s + e.amount, 0);
  document.getElementById('total').textContent = '$' + total.toFixed(2);
  document.getElementById('count').textContent = entries.length;

  const bycat = {};
  entries.forEach(e => bycat[e.category] = (bycat[e.category] || 0) + e.amount);
  const sorted = Object.entries(bycat).sort((a,b) => b[1]-a[1]);
  document.getElementById('top-cat').textContent = sorted.length ? sorted[0][0] : '—';

  const bd = document.getElementById('breakdown');
  if (!entries.length) bd.innerHTML = '<div class="empty-msg">No entries yet</div>';
  else {
    bd.innerHTML = Object.keys(CAT_COLORS).map(cat => {
      const amt = bycat[cat] || 0;
      const pct = total > 0 ? (amt / total * 100) : 0;
      return `<div class="breakdown-row">
        <span class="cat-name">${cat}</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${CAT_COLORS[cat].bar}"></div></div>
        <span class="cat-pct">${pct.toFixed(1)}%</span>
        <span class="cat-amt">$${amt.toFixed(2)}</span>
      </div>`;
    }).join('');
  }

  const lw = document.getElementById('log-wrap');
  if (!entries.length) lw.innerHTML = '<div class="empty-msg">No entries yet</div>';
  else {
    const sortedEntries = [...entries].sort((a, b) => new Date(b.rawDate) - new Date(a.rawDate));
    lw.innerHTML = `<table class="log-table">
      <thead><tr><th>Date & Time</th><th>Category</th><th>Note</th><th>Amount</th><th></th></tr></thead>
      <tbody>${sortedEntries.map(e => `<tr>
        <td>${e.date}</td>
        <td><span class="cat-badge" style="background:${CAT_COLORS[e.category].bg};color:${CAT_COLORS[e.category].text}">${e.category}</span></td>
        <td>${e.note || '—'}</td>
        <td style="font-family:monospace">$${e.amount.toFixed(2)}</td>
        <td><button class="del-btn" onclick="deleteEntry(${e.id})">×</button></td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
}

function exportCSV() {
  let csv = 'Date,Category,Note,Amount\n' + entries.map(e => `"${e.date}","${e.category}","${e.note}","${e.amount.toFixed(2)}"`).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cash-log-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

document.querySelectorAll('input').forEach(i => i.addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); }));
setNow();
render();
</script>
</body>
</html>
