<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f0e8; color: #1a1a1a; min-height: 100vh; }
  header { background: #1a1a1a; color: #f5f0e8; padding: 1.5rem 2rem; display: flex; align-items: baseline; gap: 1rem; }
  header h1 { font-size: 1.6rem; font-weight: normal; }
  .container { max-width: 850px; margin: 0 auto; padding: 2rem 1.25rem; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 2rem; }
  .metric { background: #fff; border: 1px solid #e0d8cc; border-radius: 6px; padding: 1rem; }
  .metric-label { font-size: 11px; text-transform: uppercase; color: #888; font-family: monospace; }
  .metric-value { font-size: 1.6rem; }
  .spent { color: #b34a00; }
  .card { background: #fff; border: 1px solid #e0d8cc; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 11px; text-transform: uppercase; color: #888; font-family: monospace; margin-bottom: 1rem; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  input, select { height: 38px; padding: 0 10px; border: 1px solid #d0c8bc; border-radius: 5px; background: #faf8f4; font-size: 14px; }
  .btn { height: 38px; padding: 0 18px; border: 1px solid #1a1a1a; border-radius: 5px; background: #1a1a1a; color: #f5f0e8; cursor: pointer; }
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  .log-table td, .log-table th { padding: 9px 8px; border-bottom: 1px solid #f0ebe2; text-align: left; }
  .cat-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-family: monospace; }
  .bar-wrap { flex: 1; height: 10px; background: #ede8df; border-radius: 10px; overflow: hidden; margin: 0 10px; }
  .bar-fill { height: 100%; transition: width 0.4s; }
  .breakdown-row { display: flex; align-items: center; margin-bottom: 10px; }
  .del-btn { color: #ccc; border: none; background: none; cursor: pointer; font-size: 16px; font-weight: bold; }
  .del-btn:hover { color: #b34a00; }
  .history-item { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid #f0ebe2; }
  @media (max-width: 600px) { .metrics { grid-template-columns: 1fr; } .form-row { flex-direction: column; align-items: stretch; } }
</style>
</head>
<body>

<header><h1>Cash Tracker</h1></header>

<div class="container">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total Spent</div><div class="metric-value spent" id="total">€0.00</div></div>
    <div class="metric"><div class="metric-label">Entries</div><div class="metric-value" id="count">0</div></div>
    <div class="metric"><div class="metric-label">Status</div><div class="metric-value" id="status" style="font-size:14px; color:green;">Active</div></div>
  </div>

  <div class="card">
    <div class="card-title">Add Expense</div>
    <div class="form-row">
      <div class="form-group"><label style="font-size:12px;">Date</label><input type="datetime-local" id="datetime"></div>
      <div class="form-group"><label style="font-size:12px;">Amount (€)</label><input type="number" id="amount" step="0.01"></div>
      <div class="form-group">
        <label style="font-size:12px;">Category</label>
        <select id="category">
          <option value="Groceries">🛒 Groceries</option>
          <option value="Coffee">☕ Coffee</option>
          <option value="Tobacco">🚬 Tobacco</option>
          <option value="Drinks">🍺 Drinks</option>
          <option value="Random">🎲 Random</option>
        </select>
      </div>
      <button class="btn" onclick="addEntry()">Add</button>
    </div>
  </div>

  <div class="card"><div class="card-title">Breakdown</div><div id="breakdown"></div></div>

  <div class="card">
    <div class="card-title">Log</div>
    <div id="log-wrap"></div>
    <div
