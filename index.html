<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f0e8; color: #1a1a1a; min-height: 100vh; }
  header { background: #1a1a1a; color: #f5f0e8; padding: 1.5rem 2rem; display: flex; align-items: baseline; gap: 1rem; }
  header h1 { font-size: 1.6rem; font-weight: normal; }
  header span { font-size: 0.85rem; color: #999; font-family: monospace; }
  .container { max-width: 850px; margin: 0 auto; padding: 2rem 1.25rem; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 2rem; }
  .metric { background: #fff; border: 1px solid #e0d8cc; border-radius: 6px; padding: 1rem; }
  .metric-label { font-size: 11px; text-transform: uppercase; color: #888; font-family: monospace; }
  .metric-value { font-size: 1.6rem; }
  .metric-value.spent { color: #b34a00; }
  .card { background: #fff; border: 1px solid #e0d8cc; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 11px; text-transform: uppercase; color: #888; font-family: monospace; margin-bottom: 1rem; }
  .form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: #666; font-family: monospace; }
  input, select { height: 38px; padding: 0 10px; border: 1px solid #d0c8bc; border-radius: 5px; background: #faf8f4; font-size: 14px; outline: none; }
  .fg-date input { width: 210px; }
  .fg-amount input { width: 100px; }
  .btn { height: 38px; padding: 0 18px; border: 1px solid #1a1a1a; border-radius: 5px; background: #1a1a1a; color: #f5f0e8; cursor: pointer; }
  .btn.outline { background: transparent; color: #1a1a1a; border-color: #999; }
  .breakdown-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-wrap { flex: 1; height: 10px; background: #ede8df; border-radius: 10px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.4s; }
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .log-table th { text-align: left; font-size: 11px; color: #888; font-family: monospace; padding-bottom: 8px; border-bottom: 1px solid #e0d8cc; }
  .log-table td { padding: 9px 8px 9px 0; border-bottom: 1px solid #f0ebe2; }
  .cat-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-family: monospace; }
  .del-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; }
  @media (max-width: 600px) { .metrics { grid-template-columns: 1fr; } .form-row { flex-direction: column; align-items: stretch; } .fg-date input, .fg-amount input { width: 100%; } }
</style>
</head>
<body>

<header><h1>Cash Tracker</h1><span>where did it go?</span></header>

<div class="container">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total Spent</div><div class="metric-value spent" id="total">€0.00</div></div>
    <div class="metric"><div class="metric-label">Entries</div><div class="metric-value" id="count">0</div></div>
    <div class="metric"><div class="metric-label">Top Category</div><div class="metric-value" id="top-cat" style="font-size:1rem;">—</div></div>
  </div>

  <div class="card">
    <div class="card-title">Add Expense</div>
    <div class="form-row">
      <div class="form-group fg-date"><label>Date & Time</label><input type="datetime-local" id="datetime"></div>
      <div class="form-group fg-amount"><label>Amount (€)</label><input type="number" id="amount" step="0.01"></div>
      <div class="form-group fg-cat">
        <label>Category</label>
        <select id="category">
          <option value="Groceries">🛒 Groceries</option>
          <option value="Coffee">☕ Coffee</option>
          <option value="Tobacco">🚬 Tobacco</option>
          <option value="Drinks">🍺 Drinks</option>
          <option value="Random">🎲 Random</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;"><label>Note</label><input type="text" id="note" style="width:100%;"></div>
      <button class="btn" onclick="addEntry()">Add</button>
    </div>
  </div>

  <div class="card"><div class="card-title">Spending Breakdown</div><div id="breakdown"></div></div>

  <div class="card">
    <div class="card-title">Log</div>
    <div id="log-wrap"></div>
    <div style="margin-top:1rem; display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn outline" onclick="clearAll()">Clear All</button>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>
</div>

<script>
// Colors reordered to match the select menu
const CAT_COLORS = {
  Groceries: { bg: '#eaf3ea', text: '#2d6a2d', bar: '#5a8a5a' },
  Coffee: { bg: '#fff3e8', text: '#8a4a00', bar: '#c8813a' },
  Tobacco: { bg: '#f0ece6', text: '#5a4a3a', bar: '#8a7a6a' },
  Drinks: { bg: '#e8eef6', text: '#2a4a7a', bar: '#4a6a9a' },
  Random: { bg: '#f3eaf3', text: '#6a2a6a', bar: '#9a5a8a' }
};

let entries = JSON.parse(localStorage.getItem('cashEntries') || '[]');

function setNow() {
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('datetime').value = now.toISOString().slice(0, 16);
}

function save() { localStorage.setItem('cashEntries', JSON.stringify(entries)); }

function addEntry() {
  const amt = parseFloat(document.getElementById('amount').value);
  if (!amt || amt <= 0) return;
  
  const dtValue = document.getElementById('datetime').value;
  const dateObj = new Date(dtValue);
  
  const formattedDate = dateObj.toLocaleString('en-GB', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).replace(',', '');

  entries.push({
    id: Date.now(),
    amount: amt,
    category: document.getElementById('category').value,
    note: document.getElementById('note').value,
    date: formattedDate,
    rawDate: dtValue
  });

  save();
  document.getElementById('amount').value = '';
  document.getElementById('note').value = '';
  setNow();
  render();
}

function deleteEntry(id) { entries = entries.filter(e => e.id !== id); save(); render(); }
function clearAll() { if(confirm('Clear all?')) { entries = []; save(); render(); } }

function render() {
  const total = entries.reduce((s, e) => s + e.amount, 0);
  document.getElementById('total').textContent = '€' + total.toFixed(2);
  document.getElementById('count').textContent = entries.length;

  const bycat = {};
  entries.forEach(e => bycat[e.category] = (bycat[e.category] || 0) + e.amount);
  
  const bd = document.getElementById('breakdown');
  bd.innerHTML = Object.keys(CAT_COLORS).map(cat => {
    const amt = bycat
